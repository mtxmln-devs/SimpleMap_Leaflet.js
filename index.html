<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Prime — Premium Interactive Mapping</title>
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Local Stylesheets -->
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="bg-darker text-white overflow-hidden font-sans">

    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 z-50 flex items-center justify-center bg-darker transition-opacity duration-500">
        <div class="text-center">
            <span class="loader mb-4"></span>
            <p class="text-sm text-gray-400 tracking-widest uppercase font-display">Initializing Atlas</p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed left-0 top-0 h-full w-80 glass z-20 flex flex-col border-r border-white/10">
        <!-- Header -->
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center gap-3 mb-1">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="font-display font-bold text-xl tracking-tight">Atlas Prime</h1>
                    <p class="text-xs text-gray-400">Global Intelligence System</p>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="p-4">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search locations..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pl-11 text-sm focus:outline-none focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all placeholder-gray-500">
                <svg class="w-4 h-4 text-gray-500 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>

        <!-- Stats -->
        <div class="px-4 pb-4 grid grid-cols-2 gap-3">
            <div class="glass-panel rounded-xl p-3">
                <p class="text-xs text-gray-400 mb-1">Active Nodes</p>
                <p class="text-2xl font-display font-bold gradient-text" id="activeNodes">0</p>
            </div>
            <div class="glass-panel rounded-xl p-3">
                <p class="text-xs text-gray-400 mb-1">Coverage</p>
                <p class="text-2xl font-display font-bold text-accent">94%</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="px-4 pb-4">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Filter Layers</h3>
            <div class="space-y-2">
                <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 cursor-pointer transition-colors group">
                    <input type="checkbox" checked class="w-4 h-4 rounded border-white/20 bg-white/5 text-primary focus:ring-primary/50 filter-checkbox" data-layer="hubs">
                    <span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(99,102,241,0.6)]"></span>
                    <span class="text-sm text-gray-300 group-hover:text-white transition-colors">Hub Locations</span>
                </label>
                <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 cursor-pointer transition-colors group">
                    <input type="checkbox" checked class="w-4 h-4 rounded border-white/20 bg-white/5 text-secondary focus:ring-secondary/50 filter-checkbox" data-layer="satellites">
                    <span class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_rgba(139,92,246,0.6)]"></span>
                    <span class="text-sm text-gray-300 group-hover:text-white transition-colors">Satellite Uplinks</span>
                </label>
                <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 cursor-pointer transition-colors group">
                    <input type="checkbox" checked class="w-4 h-4 rounded border-white/20 bg-white/5 text-accent focus:ring-accent/50 filter-checkbox" data-layer="zones">
                    <span class="w-2 h-2 rounded-full bg-accent shadow-[0_0_8px_rgba(6,182,212,0.6)]"></span>
                    <span class="text-sm text-gray-300 group-hover:text-white transition-colors">Security Zones</span>
                </label>
            </div>
        </div>

        <!-- Location List -->
        <div class="flex-1 overflow-y-auto px-4">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Recent Activity</h3>
            <div id="locationList" class="space-y-2">
                <!-- Dynamic content loaded by JS -->
            </div>
        </div>

        <!-- Footer -->
        <div class="p-4 border-t border-white/10">
            <button id="resetViewBtn" class="w-full py-2.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-sm font-medium transition-all flex items-center justify-center gap-2 group">
                <svg class="w-4 h-4 text-gray-400 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                Reset View
            </button>
        </div>
    </aside>

    <!-- Toggle Sidebar Button -->
    <button id="toggleSidebar" class="fixed left-4 top-4 z-30 w-10 h-10 rounded-xl glass flex items-center justify-center hover:bg-white/10 transition-all lg:hidden">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Floating Info Panel -->
    <div class="fixed right-6 top-6 z-20 w-72 glass-panel rounded-2xl p-4 hidden lg:block animate-slide-in">
        <div class="flex items-center justify-between mb-3">
            <h3 class="font-display font-semibold text-sm">Live Metrics</h3>
            <span class="flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
        </div>
        <div class="space-y-3">
            <div class="flex justify-between items-center text-sm">
                <span class="text-gray-400">Latency</span>
                <span class="font-mono text-accent">24ms</span>
            </div>
            <div class="flex justify-between items-center text-sm">
                <span class="text-gray-400">Throughput</span>
                <span class="font-mono text-primary">1.2 TB/s</span>
            </div>
            <div class="flex justify-between items-center text-sm">
                <span class="text-gray-400">Nodes Active</span>
                <span class="font-mono text-secondary">847</span>
            </div>
            <div class="mt-3 pt-3 border-t border-white/10">
                <div class="flex items-center gap-2 text-xs text-gray-500">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    System Operational
                </div>
            </div>
        </div>
    </div>

    <!-- Coordinates Display -->
    <div class="fixed bottom-6 left-6 z-20 glass-panel rounded-xl px-4 py-2 text-xs font-mono text-gray-400 hidden lg:block">
        <span id="coords">Lat: 0.0000 | Lng: 0.0000</span>
    </div>

    <!-- External Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Local Scripts -->
    <script src="js/data.js"></script>
    <script src="js/markers.js"></script>
    <script src="js/map.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4',
                        dark: '#0f172a',
                        darker: '#020617',
                    }
                }
            }
        }
    </script>
</body>
</html>
